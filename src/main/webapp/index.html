<!doctype html>
<html lang="en">
  <head>
    <title>Login V1</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--===============================================================================================-->
    <link rel="icon" type="image/png" href="images_log/icons/favicon.ico" />
    <!--===============================================================================================-->
    <link
      rel="stylesheet"
      type="text/css"
      href="vendor_log/bootstrap/css/bootstrap.min.css"
    />
    <!--===============================================================================================-->
    <link
      rel="stylesheet"
      type="text/css"
      href="fonts_log/font-awesome-4.7.0/css/font-awesome.min.css"
    />
    <!--===============================================================================================-->
    <link
      rel="stylesheet"
      type="text/css"
      href="vendor_log/animate/animate.css"
    />
    <!--===============================================================================================-->
    <link
      rel="stylesheet"
      type="text/css"
      href="vendor_log/css-hamburgers/hamburgers.min.css"
    />
    <!--===============================================================================================-->
    <link
      rel="stylesheet"
      type="text/css"
      href="vendor_log/select2/select2.min.css"
    />
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="css_log/util.css" />
    <link rel="stylesheet" type="text/css" href="css_log/main.css" />
    <!--===============================================================================================-->
    <style>
      .show-btn {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        display: block;
        font-size: 15px;
        color: gray;
      }
    </style>
  </head>

  <body>
    <div class="limiter">
      <div class="container-login100">
        <div class="wrap-login100">
          <div class="login100-pic js-tilt" data-tilt>
            <img src="images/logo_mdt_baru_1.png" alt="IMG" />
          </div>

          <form class="login100-form validate-form" action="" method="POST">
            <span class="login100-form-title"> Log Masuk </span>

            <div
              class="wrap-input100 validate-input"
              data-validate="Valid email is required: ex@abc.xyz"
            >
              <input
                class="input100"
                type="text"
                name="ic"
                placeholder="IC"
                required
              />
              <span class="focus-input100"></span>
              <span class="symbol-input100">
                <i class="fa fa-envelope" aria-hidden="true"></i>
              </span>
            </div>

            <div
              class="wrap-input100 validate-input"
              data-validate="Password is required"
            >
              <input
                class="input100"
                type="password"
                name="pass"
                id="pass"
                placeholder="Kata Laluan"
                required
              />
              <span class="focus-input100"></span>
              <span class="symbol-input100">
                <i class="fa fa-lock" aria-hidden="true"></i>
              </span>
              <span class="show-btn"><i class="fa fa-eye-slash"></i></span>
            </div>

            <div class="container-login100-form-btn">
              <a
                class="login100-form-btn"
                name="button-login"
                href="code/request_dashboard.html"
              >
                Log Masuk
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!--===============================================================================================-->
    <script src="vendor_log/jquery/jquery-3.2.1.min.js"></script>
    <!--===============================================================================================-->
    <script src="vendor_log/bootstrap/js/popper.js"></script>
    <script src="vendor_log/bootstrap/js/bootstrap.min.js"></script>
    <!--===============================================================================================-->
    <script src="vendor_log/select2/select2.min.js"></script>
    <!--===============================================================================================-->
    <script src="vendor_log/tilt/tilt.jquery.min.js"></script>
    <script>
      $(".js-tilt").tilt({
        scale: 1.1,
      });
      document
        .querySelector(".show-btn")
        .addEventListener("click", function () {
          const input = document.getElementById("pass");
          const eye = this.querySelector("i");

          input.type = input.type == "password" ? "text" : "password";
          eye.className =
            input.type == "password" ? "fa fa-eye-slash" : "fa fa-eye";
        });
    </script>
    <!--===============================================================================================-->
    <script src="js_log/main.js"></script>
  </body>
</html>
