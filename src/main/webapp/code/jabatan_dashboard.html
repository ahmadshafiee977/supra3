            <!-- Add this JavaScript to handle fullscreen functionality -->
            <script>
              // Check if the page should load in fullscreen based on localStorage
              if (localStorage.getItem("isFullscreen") === "true") {
                goFullscreen();
              }

              // Fullscreen toggle functionality
              document
                .getElementById("fullscreen-btn")
                .addEventListener("click", function () {
                  if (
                    !document.fullscreenElement &&
                    !document.mozFullScreenElement &&
                    !document.webkitFullscreenElement &&
                    !document.msFullscreenElement
                  ) {
                    // Request fullscreen
                    goFullscreen();
                    localStorage.setItem("isFullscreen", "true"); // Save fullscreen state
                  } else {
                    // Exit fullscreen if already in fullscreen
                    exitFullscreen();
                    localStorage.setItem("isFullscreen", "false"); // Save fullscreen state
                  }
                });

              // Function to request fullscreen
              function goFullscreen() {
                if (document.documentElement.requestFullscreen) {
                  document.documentElement.requestFullscreen();
                } else if (document.documentElement.mozRequestFullScreen) {
                  // Firefox
                  document.documentElement.mozRequestFullScreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                  // Chrome, Safari, Opera
                  document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) {
                  // IE/Edge
                  document.documentElement.msRequestFullscreen();
                }
              }

              // Function to exit fullscreen
              function exitFullscreen() {
                if (document.exitFullscreen) {
                  document.exitFullscreen();
                } else if (document.mozCancelFullScreen) {
                  // Firefox
                  document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) {
                  // Chrome, Safari, Opera
                  document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                  // IE/Edge
                  document.msExitFullscreen();
                }
              }

              // Optional: Add a keydown event listener to handle the Esc key if desired.
              document.addEventListener("keydown", function (event) {
                if (event.key === "Escape") {
                  exitFullscreen();
                  localStorage.setItem("isFullscreen", "false"); // Save fullscreen state
                }
              });
            </script>

      <script>
        function formatDate(input) {
          if (input.value) {
            const [year, month, day] = input.value.split("-");
            input.type = "text";
            input.value = `${day}-${month}-${year}`;
          } else {
            input.type = "text";
          }
        }

        function textToDate(text) {
          if (text.value) {
            const [day, month, year] = text.value.split("-");
            text.type = "date";
            text.value = `${year}-${month}-${day}`;
          } else {
            text.type = "date";
          }
        }
      </script>

      <script>
        document.getElementById("toggle-form").onclick = function () {
          var form = document.getElementById("form-tambah-jabatan");
          form.style.display = form.style.display == "none" ? "block" : "none";
        };

        document
          .querySelectorAll(".btn-edit, .btn-close")
          .forEach(function (button) {
            button.addEventListener("click", function () {
              var row = this.closest("tr");
              row.querySelectorAll(".display").forEach(function (span) {
                span.style.display =
                  span.style.display === "none" ? "block" : "none";
              });
              row.querySelectorAll(".edit").forEach(function (input) {
                input.style.display =
                  input.style.display === "block" ? "none" : "block";
              });
              row.querySelector(".btn-edit").style.display =
                row.querySelector(".btn-edit").style.display === "none"
                  ? "inline-block"
                  : "none";
              row.querySelector(".btn-save").style.display =
                row.querySelector(".btn-save").style.display === "inline-block"
                  ? "none"
                  : "inline-block";
              row.querySelector(".btn-close").style.display =
                row.querySelector(".btn-close").style.display === "inline-block"
                  ? "none"
                  : "inline-block";
            });
          });
